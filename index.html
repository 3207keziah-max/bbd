<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday Sara 💖</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(#ffd6e0, #fff0f5);
      text-align: center;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      color: white;
    }

    .active {
      display: flex;
    }

    h1 { font-size: 40px; }
    p { font-size: 20px; }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: white;
      color: pink;
      cursor: pointer;
      margin-top: 20px;
    }

    /* cake */
    .cake {
      font-size: 80px;
      cursor: pointer;
    }

    /* star */
    .star {
      position: absolute;
      font-size: 30px;
      animation: shoot 2s linear forwards;
    }

    @keyframes shoot {
      from { transform: translate(-100px, -100px); opacity: 1; }
      to { transform: translate(100vw, 100vh); opacity: 0; }
    }
  </style>
</head>

<body>

<!-- SCREEN 1: INTRO -->
<div id="screen1" class="screen active">
  <h1>✨ Welcome Sara ✨</h1>
  <p>Something special is waiting for you… 🎀</p>
  <p>(imagine your fav characters here 😭💖)</p>
  <button onclick="nextScreen(2)">Start 💕</button>
</div>

<!-- SCREEN 2: MESSAGES -->
<div id="screen2" class="screen">
  <h1>Happy Birthday 🎂</h1>
  <p id="msg">Tap below 👀</p>
  <button onclick="nextMessage()">Tap 💖</button>
</div>

<!-- SCREEN 3: CAKE -->
<div id="screen3" class="screen">
  <h1>Make a wish 🎂✨</h1>
  <div class="cake" onclick="blowCandle()">🎂</div>
  <p>(Tap the cake to blow candles)</p>
</div>

<!-- SCREEN 4: WISH -->
<div id="screen4" class="screen">
  <h1>What’s your wish? 💭</h1>
  <input id="wish" placeholder="Type your wish..." style="padding:10px;border-radius:10px;border:none;">
  <button onclick="shootStar()">Send it to the stars 🌠</button>
</div>

<!-- SCREEN 5: FINAL -->
<div id="screen5" class="screen">
  <h1>💖 Your wish is on its way 💖</h1>
  <p>I love you so much Sara 😭✨</p>
</div>

<audio id="music" loop>
  <source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>
let step = 0;

function nextScreen(num) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen" + num).classList.add("active");

  if (num === 2) document.getElementById("music").play();
}

function nextMessage() {
  const msg = document.getElementById("msg");

  if (step === 0) msg.innerHTML = "You are literally amazing 💖";
  else if (step === 1) msg.innerHTML = "You make everything better ✨";
  else if (step === 2) msg.innerHTML = "I’m so lucky to have you 🥹";
  else if (step === 3) {
    nextScreen(3);
    return;
  }

  step++;
}

function blowCandle() {
  nextScreen(4);
}

function shootStar() {
  let star = document.createElement("div");
  star.className = "star";
  star.innerHTML = "🌟";
  document.body.appendChild(star);

  setTimeout(() => {
    nextScreen(5);
  }, 1500);
}
</script>

</body>
</html>
